name: Android Build

on:
  push:
    branches: [ "claude/english-practice-app-Vp0h6", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "No build-tools dir"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run KSP (Hilt + Room codegen)
        run: ./gradlew kspDebugKotlin --stacktrace --no-daemon 2>&1 | tee /tmp/ksp.log; exit ${PIPESTATUS[0]}

      - name: Compile Kotlin sources
        run: ./gradlew compileDebugKotlin --stacktrace --no-daemon 2>&1 | tee /tmp/compile.log; exit ${PIPESTATUS[0]}

      - name: Process resources
        run: ./gradlew processDebugResources --stacktrace --no-daemon 2>&1 | tee /tmp/resources.log; exit ${PIPESTATUS[0]}

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            /tmp/ksp.log
            /tmp/compile.log
            /tmp/resources.log
          retention-days: 3

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
