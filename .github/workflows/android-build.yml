name: Android Build

on:
  push:
    branches: [ "claude/english-practice-app-Vp0h6", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Find sdkmanager and install platform-35
        run: |
          # cmdline-tools may be versioned (e.g. 15.0) without a 'latest' symlink
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found under $ANDROID_HOME/cmdline-tools"
            find "$ANDROID_HOME" -name "sdkmanager" 2>/dev/null
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
